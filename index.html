const SHEET_WEBAPP_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

function gcalUrl(g) {
  const title   = encodeURIComponent("竹笋大会 2026 · " + g.seq + " " + g.name);
  const details = encodeURIComponent(
    "出场时间：" + g.edtSlot + (g.localSlot ? "（" + g.tz + " " + g.localSlot + "）" : "") + "\n" +
    g.panel + " · 15 分钟（10 分钟分享 + 5 分钟 Q&A）\n\n" +
    "分享内容参考：\n" + TOPICS.map((t,i)=>(i+1)+". "+t).join("\n") + "\n\n" +
    "参会注意事项：\n" + NOTES.join("\n")
  );
  return "https://calendar.google.com/calendar/render?action=TEMPLATE&text="+title+"&dates="+g.gcalStart+"/"+g.gcalEnd+"&details="+details;
}

function App() {
  const [query,setQuery]=useState("");
  const [showDrop,setShowDrop]=useState(false);
  const [guest,setGuest]=useState(null);
  const [step,setStep]=useState("search");
  const [adjTime,setAdjTime]=useState("");
  const [adjTz,setAdjTz]=useState("EDT（美东）");
  const [adjNote,setAdjNote]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [existing,setExisting]=useState(null);
  const [showBrowse,setShowBrowse]=useState(false);
  const [adminMode,setAdminMode]=useState(false);
  const [adminPwd,setAdminPwd]=useState("");
  const [adminErr,setAdminErr]=useState(false);
  const [adminData,setAdminData]=useState([]);
  const inputRef=useRef(null);

  const filtered=query.length>0?GUESTS.filter(g=>g.name.toLowerCase().includes(query.toLowerCase())):[];

  async function loadExisting(g){
    const local = STORE.get("confirm:"+g.id);
    setExisting(local||null);
    if (!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE")) return;
    try {
      const res = await fetch(`${SHEET_WEBAPP_URL}?guestId=${encodeURIComponent(g.id)}`);
      const data = await res.json();
      if (data && data.found && data.record) setExisting(data.record);
    } catch (err) {
      console.warn("Failed to load existing record", err);
    }
  }

  useEffect(()=>{ if(guest) loadExisting(guest); },[guest]);

  async function submitToSheet(payload){
    if (!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE")) {
      throw new Error("请先填写 Google Apps Script URL");
    }
    const res = await fetch(SHEET_WEBAPP_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    if (!res.ok || !/success/i.test(text)) throw new Error(text || "提交失败");
  }

  function selectGuest(g){setGuest(g);setQuery(g.name);setShowDrop(false);setStep("confirm");setExisting(null);setShowBrowse(false);}
  async function handleConfirm(){
    const payload={guestId:guest.id,name:guest.name,seq:guest.seq,panel:guest.panel,role:guest.role,status:"confirmed",submittedAt:new Date().toISOString()};
    setSubmitting(true);
    try{
      await submitToSheet(payload);
      STORE.set("confirm:"+guest.id,payload);
      setExisting(payload);
      setStep("done_confirm");
    }catch(err){
      alert("提交失败：" + (err.message||"请稍后重试"));
    }finally{setSubmitting(false);}
  }
  async function handleAdjust(){
    if(!adjTime.trim())return;
    const payload={guestId:guest.id,name:guest.name,seq:guest.seq,panel:guest.panel,role:guest.role,status:"adjust",newTime:adjTime,newTz:adjTz,note:adjNote,submittedAt:new Date().toISOString()};
    setSubmitting(true);
    try{
      await submitToSheet(payload);
      STORE.set("confirm:"+guest.id,payload);
      setExisting(payload);
      setStep("done_adjust");
    }catch(err){
      alert("提交失败：" + (err.message||"请稍后重试"));
    }finally{setSubmitting(false);}
  }
  async function enterAdmin(){
    if(adminPwd!==ADMIN_PWD){setAdminErr(true);return;}
    try{
      let rows=[];
      if (SHEET_WEBAPP_URL && !SHEET_WEBAPP_URL.includes("PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE")) {
        const res = await fetch(`${SHEET_WEBAPP_URL}?admin=1&pwd=${encodeURIComponent(adminPwd)}`);
        const data = await res.json();
        rows = (data.records||[]);
      }
      const byId = new Map(rows.map(r=>[r.guestId,r]));
      setAdminData(GUESTS.map(g=>byId.get(g.id)||STORE.get("confirm:"+g.id)||{guestId:g.id,name:g.name,seq:g.seq,panel:g.panel,status:"pending"}));
      setAdminMode(true);
    }catch(err){
      alert("读取记录失败：" + (err.message||"请稍后重试"));
    }
  }
  function clearAll(){
    if(!window.confirm("确定清空当前浏览器缓存记录？Google Sheets 中的数据不会被删除。"))return;
    GUESTS.forEach(g=>STORE.del("confirm:"+g.id));
    setAdminData(GUESTS.map(g=>({guestId:g.id,name:g.name,seq:g.seq,panel:g.panel,status:"pending"})));
  }
  function reset(){setQuery("");setGuest(null);setStep("search");setAdjTime("");setAdjNote("");setExisting(null);setShowBrowse(false);setTimeout(()=>inputRef.current&&inputRef.current.focus(),100);}

  return (
    <div style={s.wrap}>
      <div style={{marginBottom:28}}>
        <div style={s.logo}>🎋 竹笋大会 2026</div>
        <h1 style={s.title}>嘉宾时间确认</h1>
        <p style={s.subtitle}>请确认您的出场时间安排，如有调整需求可在下方提交。</p>
        <div style={s.infoBanner}>
          <div><strong>Panel 1</strong>　4/24（周五）晚 8–11 PM EDT</div>
          <div style={{color:"#7a9a5a",fontSize:11}}>北京时间：4/25（周六）早 8–11 AM</div>
          <div style={{marginTop:4}}><strong>Panel 2</strong>　4/25（周六）晚 8–11 PM EDT</div>
          <div style={{color:"#7a9a5a",fontSize:11}}>北京时间：4/26（周日）早 8–11 AM</div>
        </div>
        <div style={{marginTop:10,fontSize:11,color:"#999",lineHeight:1.7}}>
          当前版本已支持提交到 Google Sheets。上线前请先在代码中填入 <code style={{background:"#f3f3f3",padding:"1px 4px",borderRadius:4}}>SHEET_WEBAPP_URL</code>。
        </div>
      </div>

      {step==="search"&&(
        <div style={s.card}>
          <label style={s.label}>找到你的名字</label>
          <div style={{position:"relative"}}>
            <input ref={inputRef} style={s.input} placeholder="输入姓名搜索，例如：Nancy、Helen…"
              value={query} autoComplete="off"
              onChange={e=>{setQuery(e.target.value);setShowDrop(true);setShowBrowse(false);}}
              onFocus={()=>setShowDrop(true)} onBlur={()=>setTimeout(()=>setShowDrop(false),150)}/>
            {showDrop&&filtered.length>0&&(
              <div style={s.dropdown}>{filtered.map(g=>(
                <div key={g.id} className="drop-item" style={s.dropItem} onMouseDown={()=>selectGuest(g)}>
                  <div style={{fontSize:15,fontWeight:600,color:"#1a1a1a"}}>{g.seq}&nbsp;&nbsp;{g.name}</div>
                  <div style={{fontSize:12,color:"#999",marginTop:1}}>{g.role} · {g.panel}</div>
                </div>
              ))}</div>
            )}
            {showDrop&&query.length>0&&filtered.length===0&&(
              <div style={s.dropdown}><div style={{padding:"12px 14px",fontSize:13,color:"#aaa"}}>未找到匹配名字</div></div>
            )}
          </div>
          {!showBrowse&&(
            <div style={{marginTop:12,textAlign:"center"}}>
              <button style={{background:"none",border:"none",color:"#aaa",fontSize:12,cursor:"pointer"}}
                onClick={()=>{setShowBrowse(true);setShowDrop(false);setQuery("");}}>找不到？浏览完整名单</button>
            </div>
          )}
          {showBrowse&&(
            <div style={{marginTop:12,border:"1.5px solid #e0e0e0",borderRadius:10,overflow:"hidden",maxHeight:320,overflowY:"auto"}}>
              <div style={{padding:"8px 14px",background:"#f5f5f5",fontSize:11,color:"#aaa",fontWeight:600,letterSpacing:"0.06em",borderBottom:"1px solid #e8e8e8"}}>全部嘉宾 · 点击选择</div>
              {GUESTS.map(g=>(
                <div key={g.id} className="drop-item" style={{...s.dropItem,background:"#fff"}} onClick={()=>selectGuest(g)}>
                  <div style={{fontSize:14,fontWeight:600,color:"#1a1a1a"}}>{g.seq}&nbsp;&nbsp;{g.name}</div>
                  <div style={{fontSize:11,color:"#999",marginTop:1}}>{g.role} · {g.panel}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {step==="confirm"&&guest&&(
        <>
          <button style={s.backBtn} onClick={reset}>← 重新选择</button>
          {existing&&<div style={s.existBadge}>✓ 您已于 {new Date(existing.submittedAt).toLocaleDateString("zh-CN")} 提交过回复（{existing.status==="confirmed"?"已确认参加":"申请调整"}），可重新提交覆盖。</div>}
          <div style={{...s.card,padding:0,overflow:"hidden"}}>
            <div style={{...s.slotCard,borderRadius:0,border:"none",borderBottom:"1px solid #c8e0b8"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#6B8F4E",letterSpacing:"0.1em",marginBottom:4}}>{guest.seq}</div>
              <div style={{fontSize:20,fontWeight:700,color:"#2a3a1a",marginBottom:2}}>{guest.name}</div>
              <div style={{fontSize:12,color:"#6B8F4E",marginBottom:14}}>{guest.role}</div>
              <div style={{height:1,background:"#c8e0b8",margin:"14px 0"}}/>
              <div style={{fontSize:11,color:"#6B8F4E",fontWeight:600,letterSpacing:"0.06em",marginBottom:4}}>您的分配时间</div>
              <div style={{fontSize:18,fontWeight:700,color:"#1a2e0a"}}>{guest.edtSlot}</div>
              {guest.localSlot&&<div style={{fontSize:13,color:"#6B8F4E",marginTop:3}}>{guest.tz} · {guest.localSlot}</div>}
              <div style={{fontSize:12,color:"#7a9a5a",marginTop:10}}>{guest.panel} · 15 分钟（10 分钟分享 + 5 分钟 Q&A）</div>
            </div>
            <div style={{padding:"18px 18px 14px"}}>
              <div style={{fontSize:13,color:"#888",marginBottom:14}}>以上时间安排是否方便？</div>
              <button className="btn-primary" style={s.btnPrimary} onClick={handleConfirm} disabled={submitting}>{submitting?"提交中…":"✓ 可以，确认参加"}</button>
              <button style={s.btnSec} onClick={()=>setStep("adjust")}>需要调整时间</button>
            </div>
          </div>
        </>
      )}

      {step==="adjust"&&guest&&(
        <>
          <button style={s.backBtn} onClick={()=>setStep("confirm")}>← 返回</button>
          <div style={s.card}>
            <div style={{fontSize:13,color:"#888",marginBottom:16,lineHeight:1.6}}>请填写您方便的时间，我们会尽力安排。</div>
            <label style={s.label}>您方便的时间段</label>
            <input style={{...s.input,marginBottom:12}} placeholder="例如：4/25 周六 9:00–10:00 PM" value={adjTime} onChange={e=>setAdjTime(e.target.value)}/>
            <label style={s.label}>您所在时区</label>
            <select style={{...s.select,marginBottom:12}} value={adjTz} onChange={e=>setAdjTz(e.target.value)}>{TIMEZONES.map(t=><option key={t}>{t}</option>)}</select>
            <label style={s.label}>备注（可选）</label>
            <textarea style={{...s.textarea,marginBottom:16}} placeholder="如有特殊情况可在此说明" value={adjNote} onChange={e=>setAdjNote(e.target.value)}/>
            <button style={{...s.btnPrimary,opacity:adjTime.trim()?1:0.5}} onClick={handleAdjust} disabled={submitting||!adjTime.trim()}>{submitting?"提交中…":"提交调整请求"}</button>
          </div>
        </>
      )}

      {step==="done_confirm"&&guest&&(
        <div>
          <div style={s.card}>
            <div style={s.successIcon}>✓</div>
            <div style={s.successTitle}>参与时间已确认！</div>
            <div style={s.successSub}>
              {guest.name}，我们期待与您相见。<br/>
              <strong>{guest.edtSlot}</strong>
              {guest.localSlot&&<><br/><span style={{color:"#aaa"}}>{guest.tz} · {guest.localSlot}</span></>}
            </div>
            <a href={gcalUrl(guest)} target="_blank" rel="noopener noreferrer" style={s.btnCal}>
              📅 添加到 Google Calendar
            </a>
            <button style={s.btnSec} onClick={reset}>返回首页</button>
          </div>
          <div style={s.notesBox}>
            <div style={s.notesTitle}>⚠️ 参会注意事项</div>
            {NOTES.map((n,i)=>(
              <div key={i} style={{fontSize:12.5,color:"#444",lineHeight:1.6,marginBottom:6,paddingLeft:16,position:"relative"}}>
                <span style={{position:"absolute",left:0,color:"#6B8F4E",fontWeight:700}}>·</span>{n}
              </div>
            ))}
          </div>
          <div style={s.notesBox}>
            <div style={s.notesTitle}>🎤 分享内容参考（10 分钟 + 5 分钟 Q&A）</div>
            {TOPICS.map((t,i)=>(
              <div key={i} style={{fontSize:12.5,color:"#444",lineHeight:1.6,marginBottom:4,paddingLeft:16,position:"relative"}}>
                <span style={{position:"absolute",left:0,color:"#6B8F4E",fontWeight:600,fontSize:11}}>{i+1}.</span>{t}
              </div>
            ))}
          </div>
        </div>
      )}

      {step==="done_adjust"&&guest&&(
        <div style={s.card}>
          <div style={{...s.successIcon,background:"#fff8e1"}}>📬</div>
          <div style={s.successTitle}>调整请求已收到</div>
          <div style={s.successSub}>{guest.name}，我们已收到您的调整请求。<br/>主办方会尽快与您确认新时间安排。</div>
          <button style={s.btnSec} onClick={reset}>返回首页</button>
        </div>
      )}

      <div style={{textAlign:"center",fontSize:11,color:"#ccc",marginTop:32}}>竹笋大会 2026 · 如有问题请联系主办方</div>

      {!adminMode&&step==="search"&&(
        <div style={{marginTop:40,borderTop:"1px solid #f0f0f0",paddingTop:20}}>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input type="password" placeholder="管理员入口"
              style={{flex:1,fontSize:13,padding:"8px 12px",border:"1px solid #e0e0e0",borderRadius:8,outline:"none",background:"#fafafa",color:"#aaa",letterSpacing:"0.1em"}}
              value={adminPwd} onChange={e=>{setAdminPwd(e.target.value);setAdminErr(false);}} onKeyDown={e=>e.key==="Enter"&&enterAdmin()}/>
            <button onClick={enterAdmin} style={{padding:"8px 14px",background:"#f5f5f5",border:"1px solid #e0e0e0",borderRadius:8,fontSize:12,color:"#888",cursor:"pointer"}}>查看</button>
          </div>
          {adminErr&&<div style={{fontSize:11,color:"#E24B4A",marginTop:6}}>密码不正确</div>}
        </div>
      )}

      {adminMode&&(
        <div style={{marginTop:32}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:"#1a1a1a"}}>回复总览&nbsp;<span style={{fontWeight:400,color:"#888"}}>{adminData.filter(r=>r.status!=="pending").length} / {adminData.length} 已回复</span></div>
            <div style={{display:"flex",gap:8}}>
              <button style={{background:"none",border:"none",fontSize:12,color:"#E24B4A",cursor:"pointer",padding:"4px 8px"}} onClick={clearAll}>清空记录</button>
              <button style={{background:"none",border:"none",fontSize:12,color:"#aaa",cursor:"pointer"}} onClick={()=>{setAdminMode(false);setAdminPwd("");}}>退出</button>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {[{label:"✓ 已确认",bg:"#e8f5e0",color:"#3a6b1e",status:"confirmed"},{label:"✎ 申请调整",bg:"#fff8e1",color:"#7a5f00",status:"adjust"},{label:"— 待回复",bg:"#f5f5f5",color:"#aaa",status:"pending"}].map(p=>(
              <div key={p.label} style={{background:p.bg,color:p.color,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:500}}>{p.label} {adminData.filter(r=>r.status===p.status).length}</div>
            ))}
          </div>
          {["Panel 1 · 周五 4/24","Panel 2 · 周六 4/25"].map(panel=>(
            <div key={panel} style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,color:"#aaa",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>{panel}</div>
              <div style={{border:"1px solid #e8e8e8",borderRadius:12,overflow:"hidden"}}>
                {adminData.filter(r=>r.panel===panel).map((r,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",padding:"10px 14px",borderTop:i===0?"none":"1px solid #f0f0f0",background:"#fff",gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12.5,fontWeight:600,color:"#1a1a1a"}}>{r.seq}&nbsp;{r.name}</div>
                      {r.status==="adjust"&&<div style={{fontSize:11,color:"#7a5f00",marginTop:3}}>调整为：{r.newTime}（{r.newTz}）{r.note?" · "+r.note:""}</div>}
                      {r.status!=="pending"&&<div style={{fontSize:10,color:"#ccc",marginTop:2}}>{new Date(r.submittedAt).toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</div>}
                    </div>
                    <div style={{flexShrink:0,fontSize:11,fontWeight:600,padding:"3px 9px",borderRadius:6,background:r.status==="confirmed"?"#e8f5e0":r.status==="adjust"?"#fff8e1":"#f5f5f5",color:r.status==="confirmed"?"#3a6b1e":r.status==="adjust"?"#7a5f00":"#bbb"}}>
                      {r.status==="confirmed"?"已确认":r.status==="adjust"?"申请调整":"待回复"}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
